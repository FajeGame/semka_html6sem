server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: semka-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/semka
    username: semka
    password: semka
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

semka:
  jwt:
    secret: "semka-dev-secret-key-min-32-chars-long!!"
    expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    ru.semka: INFO
