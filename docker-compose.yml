# полный стек — после появления Dockerfile в backend/ и frontend/
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: semka
      POSTGRES_USER: semka
      POSTGRES_PASSWORD: semka
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semka -d semka"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

