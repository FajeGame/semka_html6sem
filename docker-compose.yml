# полный стек: postgres + redis + backend + frontend
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: semka
      POSTGRES_USER: semka
      POSTGRES_PASSWORD: semka
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semka -d semka"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/semka
      SPRING_DATASOURCE_USERNAME: semka
      SPRING_DATASOURCE_PASSWORD: semka
      SPRING_DATA_REDIS_HOST: redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pg_data:
